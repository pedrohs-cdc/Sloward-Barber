<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Sloward Barbershop</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231A1F26'/%3E%3Crect x='11' y='11' width='10' height='10' rx='2' fill='%233B82F6'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .notfound__inner {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 40px 24px;
    }
    .notfound__num {
      font-family: var(--display);
      font-size: clamp(120px, 20vw, 200px);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      background: linear-gradient(180deg, var(--blue-bright), var(--blue-deep));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }
    .notfound__code {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--blue-bright);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .notfound__title {
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 16px 0 20px;
    }
    .notfound__desc {
      font-size: 18px;
      line-height: 1.6;
      color: var(--ink-mute);
      margin: 0 0 40px;
    }
    .notfound__btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .notfound__bg-num {
      position: absolute;
      font-family: var(--display);
      font-size: 40vw;
      font-weight: 700;
      color: rgba(59,130,246,0.03);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      letter-spacing: -0.1em;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="scroll-progress"></div>
  <nav class="nav">
    <div class="container">
      <a href="/" class="nav__brand"><span class="dot"></span>SLOWARD</a>
      <div class="nav__menu">
        <a href="/">inicio</a>
        <a href="/servicos">servicos</a>
        <a href="/equipe">equipe</a>
        <a href="/galeria">galeria</a>
        <a href="/localizacao">local</a>
        <a href="/blog">blog</a>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <a href="/agendar" class="nav__cta">agendar <span class="arrow">→</span></a>
        <button class="nav__burger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="nav__mobile">
      <a href="/">inicio</a>
      <a href="/servicos">servicos</a>
      <a href="/equipe">equipe</a>
      <a href="/galeria">galeria</a>
      <a href="/localizacao">local</a>
      <a href="/blog">blog</a>
      <a href="/agendar">agendar →</a>
    </div>
  </nav>

  <div class="notfound">
    <div class="bg-grid"></div>
    <div class="notfound__bg-num">404</div>
    <div class="bg-glow" style="left:50%; top:50%; transform:translate(-50%,-50%);" data-parallax="0"></div>
    <div class="notfound__inner">
      <div class="notfound__code">// erro 404</div>
      <div class="notfound__num">404</div>
      <h1 class="notfound__title">página não encontrada.</h1>
      <p class="notfound__desc">Essa URL não existe — mas seu próximo corte existe. Que tal agendar?</p>
      <div class="notfound__btns">
        <a href="/" class="btn btn--primary">voltar ao início <span class="arrow">→</span></a>
        <a href="/agendar" class="btn btn--outline">agendar horário</a>
      </div>
    </div>
  </div>

  <script src="assets/motion.js"></script>
</body>
</html>
