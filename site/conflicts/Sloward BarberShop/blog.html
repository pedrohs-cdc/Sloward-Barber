<style>
  .page-hero {
    padding: calc(var(--nav-h) + 96px) 0 64px;
    position: relative;
    overflow: hidden;
  }

  /* Featured post */
  .featured {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 48px;
    align-items: center;
    margin-top: 64px;
    padding: 48px;
    background: linear-gradient(135deg, var(--bg-2), var(--accent-bg));
    border: 1px solid var(--stroke-hot);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
  }
  .featured::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% 50%, rgba(59,130,246,0.18), transparent 60%);
  }
  .featured > * { position: relative; z-index: 2; }
  @media (max-width: 920px) { .featured { grid-template-columns: 1fr; padding: 32px; } }

  .featured__img {
    aspect-ratio: 4/3;
    border-radius: 16px;
    background: var(--bg-3);
    border: 1px solid var(--stroke-soft);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue-bright);
    opacity: 0.7;
  }
  .featured__img::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(135deg, transparent 0 28px, rgba(59,130,246,0.08) 28px 29px),
      radial-gradient(circle at 30% 30%, rgba(59,130,246,0.18), transparent 60%);
  }
  .featured__meta {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--blue-bright);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .featured__title {
    font-family: var(--display);
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 20px;
  }
  .featured__excerpt {
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 32px;
  }

  /* Posts grid */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 56px;
  }
  @media (max-width: 920px) { .posts-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 580px) { .posts-grid { grid-template-columns: 1fr; } }

  .post-card {
    background: var(--bg-2);
    border: 1px solid var(--stroke-soft);
    border-radius: 16px;
    overflow: hidden;
    transition: all 360ms var(--ease-out);
    display: flex;
    flex-direction: column;
  }
  .post-card:hover {
    transform: translateY(-6px);
    border-color: var(--stroke-hot);
  }
  .post-card__img {
    aspect-ratio: 16/10;
    background: var(--bg-3);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue-bright);
  }
  .post-card__img::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(135deg, transparent 0 22px, rgba(59,130,246,0.07) 22px 23px);
  }
  .post-card__img svg { opacity: 0.5; }
  .post-card__body {
    padding: 28px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .post-card__meta {
    display: flex;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--blue-bright);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .post-card__meta .dot {
    color: var(--ink-faint);
  }
  .post-card__title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .post-card__excerpt {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-mute);
    margin: 0 0 24px;
    flex: 1;
  }
  .post-card__more {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--blue-bright);
    text-transform: uppercase;
    transition: gap 240ms var(--ease-out);
  }
  .post-card:hover .post-card__more { gap: 12px; }

  /* Newsletter */
  .newsletter {
    margin-top: 80px;
    padding: 64px 48px;
    background: var(--bg-soft);
    border: 1px solid var(--stroke-soft);
    border-radius: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .newsletter::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: linear-gradient(var(--stroke) 1px, transparent 1px), linear-gradient(90deg, var(--stroke) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.3;
    mask-image: radial-gradient(ellipse at center, #000 20%, transparent 75%);
  }
  .newsletter > * { position: relative; z-index: 2; }
  .newsletter form {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    flex-wrap: wrap;
  }
  .newsletter input {
    flex: 1;
    min-width: 220px;
    background: var(--bg);
    border: 1px solid var(--stroke-soft);
    color: var(--ink);
    font-family: var(--display);
    font-size: 16px;
    padding: 18px 20px;
    border-radius: 10px;
    outline: none;
    transition: border-color 220ms ease;
  }
  .newsletter input:focus { border-color: var(--blue-bright); }
  .newsletter button {
    background: var(--blue);
    color: #fff;
    font-family: var(--display);
    font-weight: 500;
    font-size: 16px;
    padding: 18px 32px;
    border: 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 220ms var(--ease-out);
  }
  .newsletter button:hover { background: var(--blue-bright); transform: translateY(-2px); }
</style>
