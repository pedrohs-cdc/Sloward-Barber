<script>
  // Auth gate — must run before page renders
  (function() {
    try {
      var auth = JSON.parse(localStorage.getItem('sloward-auth') || 'null');
      if (!auth || !auth.email) {
        window.location.replace('login.html?next=agendar.html');
      }
    } catch (e) {
      window.location.replace('login.html?next=agendar.html');
    }
  })();
</script>

<style>
  .page-hero {
    padding: calc(var(--nav-h) + 96px) 0 64px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .page-hero__inner {
    max-width: 880px;
    margin: 0 auto;
  }
  .page-hero .eyebrow { display: inline-flex; }

  /* Steps */
  .steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 80px;
  }
  @media (max-width: 920px) { .steps { grid-template-columns: 1fr; gap: 16px; } }

  .step-card {
    background: var(--bg-2);
    border: 1px solid var(--stroke-soft);
    border-radius: 20px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    transition: all 360ms var(--ease-out);
  }
  .step-card:hover {
    transform: translateY(-6px);
    border-color: var(--stroke-hot);
    background: linear-gradient(180deg, var(--bg-2), var(--accent-bg));
  }
  .step-card__num {
    font-family: var(--display);
    font-size: 140px;
    line-height: 0.85;
    font-weight: 700;
    letter-spacing: -0.07em;
    background: linear-gradient(180deg, var(--blue-bright), var(--blue-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .step-card__title {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 24px 0 12px;
  }
  .step-card__desc {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-mute);
    margin: 0;
  }

  /* Form */
  .form-wrap {
    max-width: 760px;
    margin: 0 auto;
    background: linear-gradient(180deg, var(--bg-2), var(--accent-bg));
    border: 1px solid var(--stroke-hot);
    border-radius: 24px;
    padding: 56px;
    position: relative;
    overflow: hidden;
  }
  .form-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
  }
  .form-head { text-align: center; margin-bottom: 40px; }
  .form-head .eyebrow { display: inline-flex; }

  .form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .form .field--full { grid-column: 1 / -1; }
  @media (max-width: 580px) {
    .form-wrap { padding: 40px 28px; }
    .form { grid-template-columns: 1fr; }
  }

  .form__submit {
    grid-column: 1 / -1;
    background: var(--blue);
    color: #fff;
    font-family: var(--display);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.01em;
    padding: 22px 40px;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 240ms var(--ease-out);
    box-shadow: 0 6px 32px rgba(37,99,235,0.4);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .form__submit:hover {
    background: var(--blue-bright);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(37,99,235,0.55);
  }
  .form__submit .arrow { transition: transform 240ms var(--ease-out); }
  .form__submit:hover .arrow { transform: translateX(4px); }

  .form-note {
    grid-column: 1 / -1;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
    margin-top: 8px;
  }
  .form-note::before { content: "// "; color: var(--blue-bright); opacity: 0.6; }
</style>
