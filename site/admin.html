<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Sloward Barbershop</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .admin-wrap {
      min-height: 100vh;
      padding: calc(var(--nav-h) + 48px) 0 80px;
    }

    .admin-header {
      margin-bottom: 48px;
    }

    .services-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .svc-card-admin {
      background: var(--bg-2);
      border: 1px solid var(--stroke-soft);
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 24px;
      transition: all 280ms;
    }

    .svc-card-admin.inactive {
      opacity: 0.5;
    }

    .svc-card-admin:hover {
      border-color: var(--stroke-hot);
    }

    .svc-info {
      flex: 1;
    }

    .svc-info h3 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 4px;
    }

    .svc-info p {
      font-size: 14px;
      color: var(--ink-mute);
      margin: 0;
    }

    .svc-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .svc-price {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--blue-bright);
      font-weight: 600;
    }

    .svc-duration {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-mute);
    }

    .svc-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .toggle-btn {
      width: 52px;
      height: 28px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 240ms;
      background: var(--stroke-soft);
    }

    .toggle-btn.on {
      background: var(--blue);
    }

    .toggle-btn::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: transform 240ms;
    }

    .toggle-btn.on::after {
      transform: translateX(24px);
    }

    .edit-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--stroke-hot);
      background: transparent;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: all 220ms;
    }

    .edit-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--blue-bright);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-2);
      border: 1px solid var(--stroke-hot);
      border-radius: 20px;
      padding: 40px;
      width: min(560px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal h2 {
      margin: 0;
      font-size: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .btn-save {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 14px;
      cursor: pointer;
      transition: background 220ms;
    }

    .btn-save:hover {
      background: var(--blue-bright);
    }

    .btn-cancel {
      background: transparent;
      color: var(--ink-mute);
      border: 1px solid var(--stroke-soft);
      padding: 12px 28px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 14px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--blue);
      color: #fff;
      padding: 14px 24px;
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 14px;
      z-index: 300;
      opacity: 0;
      transform: translateY(16px);
      transition: all 280ms;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--bg-2);
      border: 1px solid var(--stroke-hot);
      border-radius: 20px;
      padding: 48px;
      width: min(440px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-box h1 {
      margin: 0;
      font-size: 28px;
    }

    .login-error {
      color: #ef4444;
      font-family: var(--mono);
      font-size: 13px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="scroll-progress"></div>

  <nav class="nav">
    <div class="container">
      <a href="index.html" class="nav__brand"><span class="dot"></span>SLOWARD</a>
      <div style="display:flex; align-items:center; gap:12px;">
        <span id="user-email" style="font-family:var(--mono); font-size:13px; color:var(--ink-mute);"></span>
        <button onclick="logout()" class="edit-btn">sair</button>
      </div>
    </div>
  </nav>

  <!-- LOGIN -->
  <div class="login-wrap" id="login-screen">
    <div class="login-box">
      <div>
        <div class="chip" style="margin-bottom:16px;"><span class="dot"></span>// acesso restrito</div>
        <h1>Painel <span style="color:var(--blue-bright);">Admin</span></h1>
        <p style="color:var(--ink-mute); margin-top:8px;">Entre com suas credenciais de barbeiro.</p>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="pedro@sloward.com.br" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <p class="login-error" id="login-error">E-mail ou senha incorretos.</p>
      <button class="btn btn--primary" onclick="login()" style="width:100%; justify-content:center;">
        entrar <span class="arrow">→</span>
      </button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-wrap" id="admin-screen" style="display:none;">
    <div class="container">
      <div class="admin-header">
        <div class="eyebrow">// painel de controle</div>
        <h1 class="h1" style="margin-top:16px;">Gerenciar <span style="color:var(--blue-bright);">Serviços</span></h1>
        <p class="lead" style="margin-top:16px;">Ative, desative ou edite os serviços disponíveis no site.</p>
      </div>
      <div class="services-grid" id="services-list">
        <div style="color:var(--ink-mute); font-family:var(--mono);">Carregando serviços...</div>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Editar Serviço</h2>
      <input type="hidden" id="edit-id" />
      <div class="field">
        <label>Nome</label>
        <input type="text" id="edit-nome" />
      </div>
      <div class="field">
        <label>Preço (R$)</label>
        <input type="number" id="edit-preco" />
      </div>
      <div class="field">
        <label>Duração</label>
        <input type="text" id="edit-duracao" />
      </div>
      <div class="field">
        <label>Descrição</label>
        <textarea id="edit-descricao" rows="3" style="resize:vertical;"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">cancelar</button>
        <button class="btn-save" onclick="saveService()">salvar alterações</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX6dMDVlO9sXKGiD3tAYckwRVPnw7N2is",
      authDomain: "sloward-barbershop.firebaseapp.com",
      projectId: "sloward-barbershop",
      storageBucket: "sloward-barbershop.firebasestorage.app",
      messagingSenderId: "357437108740",
      appId: "1:357437108740:web:ce61f750671c15b792fb51"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        document.getElementById('user-email').textContent = user.email;
        loadServices();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-screen').style.display = 'none';
      }
    });

    window.login = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        document.getElementById('login-error').style.display = 'block';
      }
    };

    window.logout = () => signOut(auth);

    async function loadServices() {
      console.log('loadServices chamado');
      try {
        const q = query(collection(db, 'servicos'), orderBy('ordem'));
        const snap = await getDocs(q);
        const list = document.getElementById('services-list');
        list.innerHTML = '';
        snap.forEach(docSnap => {
          const s = docSnap.data();
          const id = docSnap.id;
          const card = document.createElement('div');
          card.className = `svc-card-admin ${s.ativo ? '' : 'inactive'}`;
          card.id = `card-${id}`;
          card.innerHTML = `
      <div class="svc-info">
        <h3>${s.nome}</h3>
        <p>${s.descricao}</p>
      </div>
      <div class="svc-meta">
        <span class="svc-price">R$ ${s.preco}</span>
        <span class="svc-duration">${s.duracao}</span>
      </div>
      <div class="svc-actions">
        <button class="toggle-btn ${s.ativo ? 'on' : ''}" onclick="toggleService('${id}', ${s.ativo})" title="${s.ativo ? 'Desativar' : 'Ativar'}"></button>
        <button class="edit-btn" onclick="openModal('${id}', '${s.nome}', ${s.preco}, '${s.duracao}', \`${s.descricao}\`)">editar</button>
      </div>
    `;
          list.appendChild(card);
        });
      } catch (err) {
        console.error('Erro ao carregar:', err);
      }
    }

    window.toggleService = async (id, current) => {
      await updateDoc(doc(db, 'servicos', id), { ativo: !current });
      showToast(current ? 'Serviço desativado' : 'Serviço ativado');
      loadServices();
    };

    window.openModal = (id, nome, preco, duracao, descricao) => {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-nome').value = nome;
      document.getElementById('edit-preco').value = preco;
      document.getElementById('edit-duracao').value = duracao;
      document.getElementById('edit-descricao').value = descricao;
      document.getElementById('modal').classList.add('open');
    };

    window.closeModal = () => document.getElementById('modal').classList.remove('open');

    window.saveService = async () => {
      const id = document.getElementById('edit-id').value;
      await updateDoc(doc(db, 'servicos', id), {
        nome: document.getElementById('edit-nome').value,
        preco: Number(document.getElementById('edit-preco').value),
        duracao: document.getElementById('edit-duracao').value,
        descricao: document.getElementById('edit-descricao').value,
      });
      closeModal();
      showToast('Serviço atualizado!');
      loadServices();
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>

</html>
